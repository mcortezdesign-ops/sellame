  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: #111;
    font-family: 'InterSemiBold', Helvetica, Arial, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #fff;
  }
  #canvas { display: none; }
  .screen { display: none; width: 100%; height: 100dvh; flex-direction: column; align-items: center; justify-content: center; }
  .screen.active { display: flex; }
  #screenStart { gap: 0; background: #111; padding: 40px 24px; text-align: center; }
  .brand-logo-area { margin-bottom: 32px; }
  .brand-logo { max-width: 200px; max-height: 90px; object-fit: contain; display: block; margin: 0 auto 12px; }
  .brand-name { font-size: 28px; letter-spacing: 1px; color: #fff; margin-bottom: 4px; }
  .brand-tagline { font-size: 13px; color: rgba(255,255,255,.4); letter-spacing: .5px; }
  .btn-foto { width: 100%; max-width: 280px; background: #fff; color: #111; border: none; border-radius: 50px; font-family: 'InterSemiBold', Helvetica, Arial, sans-serif; font-size: 17px; padding: 18px; cursor: pointer; letter-spacing: .3px; margin-top: 40px; position: relative; overflow: hidden; }
  #inputFoto { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  #screenResult { background: #000; position: relative; gap: 0; }
  .result-img-wrap { width: 100%; flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
  #resultImg { width: 100%; height: 100%; object-fit: contain; display: block; }
  .result-actions { width: 100%; padding: 16px 20px 32px; background: #111; display: flex; gap: 10px; }
  .btn-action { flex: 1; border: none; border-radius: 12px; font-family: 'InterSemiBold', Helvetica, Arial, sans-serif; font-size: 15px; padding: 16px; cursor: pointer; letter-spacing: .3px; }
  .btn-download { background: #fff; color: #111; }
  .btn-new { background: #222; color: #fff; border: 1px solid #333; }
</style>
</head>

let logoImg = null;
let _photoCounter = 0;
if (CONFIG.logoSrc) {
  const img = new Image();
  img.onload = () => { logoImg = img; };
  img.src = CONFIG.logoSrc;
}
document.getElementById('inputFoto').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => processPhoto(ev.target.result);
  reader.readAsDataURL(file);
  this.value = '';
});
function processPhoto(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    const W = canvas.width;
    const H = canvas.height;
    const pad = W * 0.03;
    const bannerH = Math.min(H * 0.13, W * 0.17);
    const bannerY = H - bannerH;
    ctx.fillStyle = CONFIG.bannerColor;
    ctx.globalAlpha = 0.85;
    ctx.fillRect(0, bannerY, W, bannerH);
    ctx.globalAlpha = 1.0;
    if (logoImg) {
      const lH = bannerH * 0.65;
      const lW = (logoImg.width / logoImg.height) * lH;
      const lY = bannerY + (bannerH - lH) / 2;
      ctx.drawImage(logoImg, pad, lY, lW, lH);
    } else {
      ctx.fillStyle = '#ffffff';
      ctx.font = '900 ' + Math.round(bannerH * 0.72) + 'px InterSemiBold, Helvetica, Arial, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(CONFIG.brandName, pad, bannerY + bannerH / 2);
    }
    if (CONFIG.showDate) {
      const now = new Date();
      const dd   = String(now.getDate()).padStart(2,'0');
      const mm   = String(now.getMonth()+1).padStart(2,'0');
      const yyyy = now.getFullYear();
      const dateStr = dd + ' / ' + mm + ' / ' + yyyy;
      const fontSize = Math.round(bannerH * 0.34);
      ctx.font = fontSize + 'px InterSemiBold, Helvetica, Arial, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.textBaseline = 'middle';
      const tw = ctx.measureText(dateStr).width;
      ctx.fillText(dateStr, W - tw - pad, bannerY + bannerH / 2);
    }
    const resultUrl = canvas.toDataURL('image/jpeg', 0.92);
    document.getElementById('resultImg').src = resultUrl;
    document.getElementById('btnDownload').onclick = () => downloadPhoto(resultUrl);
    document.getElementById('screenStart').classList.remove('active');
    document.getElementById('screenResult').classList.add('active');
  };
  img.src = dataUrl;
}
function downloadPhoto(url) {
  _photoCounter++;
  const now = new Date();
  const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  const name = CONFIG.brandName.toLowerCase().replace(/\s+/g,'-') + '_' + ts + '_' + _photoCounter + '.jpg';
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
}
function goBack() {
  document.getElementById('screenResult').classList.remove('active');
  document.getElementById('screenStart').classList.add('active');
  document.getElementById('resultImg').src = '';
}
</script>
</body>
